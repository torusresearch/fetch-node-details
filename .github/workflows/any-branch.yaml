name: Test
on:
  push:
    branches-ignore:
      - develop
      - master

jobs:
  test:
    name: run tests
    strategy:
      matrix:
        node: ["24.x"]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - name: Run tests
        run: |
          npm install
          npm run build
          npm run test:ci
